<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>My Bookings — Elite Stays</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#F7F4F0;--white:#FFFFFF;--dark:#1A1A1A;--gold:#A8832A;--border:#E5DFD7;--muted:#7A7166;--text:#2D2A26;--font-h:'Cormorant Garamond',Georgia,serif;--font-b:'Outfit',sans-serif}
body{font-family:var(--font-b);background:var(--bg);color:var(--text)}
header{background:var(--white);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.nav{max-width:1200px;margin:0 auto;padding:0 32px;height:68px;display:flex;align-items:center;justify-content:space-between}
.nav-logo{font-family:var(--font-h);font-size:1.55rem;color:var(--dark);text-decoration:none}
.nav-logo span{color:var(--gold);font-style:italic}
.nav-links{display:flex;align-items:center;gap:10px}
.btn{display:inline-block;padding:8px 18px;font-size:.78rem;font-weight:500;letter-spacing:.06em;text-transform:uppercase;text-decoration:none;border:1.5px solid transparent;cursor:pointer;transition:all .2s}
.btn-outline{border-color:var(--border);color:var(--dark);background:transparent}.btn-outline:hover{border-color:var(--gold);color:var(--gold)}
.btn-gold{background:var(--gold);color:#fff;border-color:var(--gold)}.btn-gold:hover{background:var(--dark);border-color:var(--dark)}
main{max-width:1000px;margin:0 auto;padding:48px 32px 80px}
.page-header{margin-bottom:36px}
.page-tag{font-size:.65rem;font-weight:500;letter-spacing:.25em;text-transform:uppercase;color:var(--gold);margin-bottom:8px}
.page-title{font-family:var(--font-h);font-size:2.4rem;font-weight:400;color:var(--dark)}
.empty-state{text-align:center;padding:80px 20px;background:var(--white);border:1px solid var(--border)}
.empty-state p{color:var(--muted);margin:12px 0 24px}
.booking-list{display:flex;flex-direction:column;gap:16px}
.booking-card{background:var(--white);border:1px solid var(--border);display:flex;overflow:hidden;transition:box-shadow .2s}
.booking-card:hover{box-shadow:0 4px 24px rgba(0,0,0,.08)}
.booking-img{width:130px;flex-shrink:0;object-fit:cover}
.booking-body{flex:1;padding:20px 24px;display:flex;flex-direction:column;justify-content:center}
.booking-type{font-family:var(--font-h);font-size:1.3rem;font-weight:600;color:var(--dark);margin-bottom:2px}
.booking-meta{font-size:.8rem;color:var(--muted);margin-bottom:10px}
.booking-dates{display:flex;gap:20px;font-size:.83rem;margin-bottom:12px}
.booking-date-item .lbl{font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:1px}
.booking-date-item .val{font-weight:500;color:var(--dark)}
.booking-footer{display:flex;align-items:center;justify-content:space-between}
.status-badge{display:inline-block;padding:3px 12px;font-size:.7rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase}
.status-confirmed{background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0}
.status-checkedin{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}
.status-completed{background:#f9fafb;color:#6b7280;border:1px solid #e5e7eb}
.status-cancelled{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}
.booking-price{font-family:var(--font-h);font-size:1.4rem;font-weight:600;color:var(--gold)}
.btn-cancel-booking{padding:6px 14px;background:transparent;border:1.5px solid #fca5a5;color:#dc2626;font-size:.72rem;font-weight:500;text-transform:uppercase;letter-spacing:.06em;cursor:pointer;transition:all .2s;font-family:var(--font-b)}
.btn-cancel-booking:hover{background:#fef2f2}
footer{text-align:center;padding:20px;font-size:.78rem;color:var(--muted);border-top:1px solid var(--border)}
</style>
</head>
<body>
<header>
  <div class="nav">
    <a class="nav-logo" href="/rooms"><span>Elite</span> Stays</a>
    <div class="nav-links">
      <a href="/rooms" class="btn btn-outline">Browse Rooms</a>
      <a href="/logout" class="btn btn-gold">Logout</a>
    </div>
  </div>
</header>
<main>
  <div class="page-header">
    <div class="page-tag">Account</div>
    <div class="page-title">My Bookings</div>
  </div>

  <div class="empty-state" th:if="${#lists.isEmpty(myBookings)}">
    <svg width="48" height="48" fill="none" stroke="#ccc" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
    <p>You have no bookings yet.</p>
    <a href="/rooms" class="btn btn-gold" style="text-decoration:none;display:inline-block;padding:10px 28px">Browse Rooms</a>
  </div>

  <div class="booking-list" th:if="${!#lists.isEmpty(myBookings)}">
    <div class="booking-card" th:each="b : ${myBookings}">
      <img class="booking-img" alt=""
        th:src="${#strings.containsIgnoreCase(b.room.roomType,'penthouse')} ? 'https://images.unsplash.com/photo-1600607687939-ce8a6c25118c?w=200&q=80' :
                (${#strings.containsIgnoreCase(b.room.roomType,'villa')} ? 'https://images.unsplash.com/photo-1613490908592-fd53b1b9195b?w=200&q=80' :
                (${#strings.containsIgnoreCase(b.room.roomType,'suite')} ? 'https://images.unsplash.com/photo-1631049307264-da0ec9d70304?w=200&q=80' :
                (${#strings.containsIgnoreCase(b.room.roomType,'deluxe')} ? 'https://images.unsplash.com/photo-1618773928121-c32242e63f39?w=200&q=80' :
                'https://images.unsplash.com/photo-1595576508898-0ad5c879a061?w=200&q=80')))"
        onerror="this.src='https://images.unsplash.com/photo-1611892440504-42a792e24d32?w=200&q=80'">
      <div class="booking-body">
        <div class="booking-type" th:text="${b.room.roomType}"></div>
        <div class="booking-meta">Room <span th:text="${b.room.roomNumber}"></span> &middot; Booking #<span th:text="${b.id}"></span></div>
        <div class="booking-dates">
          <div class="booking-date-item"><div class="lbl">Check-In</div><div class="val" th:text="${b.checkInDate}"></div></div>
          <div class="booking-date-item"><div class="lbl">Check-Out</div><div class="val" th:text="${b.checkOutDate}"></div></div>
        </div>
        <div class="booking-footer">
          <div style="display:flex;align-items:center;gap:12px">
            <span th:switch="${b.status.name()}">
              <span th:case="'CONFIRMED'"   class="status-badge status-confirmed">Confirmed</span>
              <span th:case="'CHECKED_IN'"  class="status-badge status-checkedin">Checked In</span>
              <span th:case="'CHECKED_OUT'" class="status-badge status-completed">Completed</span>
              <span th:case="'CANCELLED'"   class="status-badge status-cancelled">Cancelled</span>
            </span>
            <form th:if="${b.status.name() == 'CONFIRMED'}" th:action="@{/bookings/cancel/{id}(id=${b.id})}" method="post" style="margin:0">
              <button type="submit" class="btn-cancel-booking" onclick="return confirm('Cancel this booking?')">Cancel</button>
            </form>
          </div>
          <div class="booking-price">&#8377;<span th:text="${b.totalPrice}"></span></div>
        </div>
      </div>
    </div>
  </div>
</main>
<footer>&copy; 2024 Elite Stays</footer>
</body>
</html>
