<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Users & Staff — Elite Stays Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#F7F4F0;--white:#FFFFFF;--dark:#1A1A1A;--gold:#A8832A;--border:#E5DFD7;--muted:#7A7166;--text:#2D2A26;--sidebar:#1C1C1C;--font-h:'Cormorant Garamond',Georgia,serif;--font-b:'Outfit',sans-serif}
body{font-family:var(--font-b);background:var(--bg);color:var(--text);display:flex;min-height:100vh}
.sidebar{width:220px;background:var(--sidebar);flex-shrink:0;display:flex;flex-direction:column}
.sidebar-logo{padding:22px 24px;border-bottom:1px solid rgba(255,255,255,.08);font-family:var(--font-h);font-size:1.3rem;color:#fff;text-decoration:none}
.sidebar-logo span{color:var(--gold);font-style:italic}
.sidebar-label{font-size:.6rem;font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.3);padding:20px 24px 8px}
.sidebar-nav{flex:1}
.sidebar-link{display:block;padding:11px 24px;font-size:.85rem;color:rgba(255,255,255,.65);text-decoration:none;border-left:3px solid transparent;transition:all .2s}
.sidebar-link:hover,.sidebar-link.active{background:rgba(255,255,255,.05);color:#fff;border-left-color:var(--gold)}
.sidebar-link.active{color:var(--gold)}
.sidebar-foot{padding:20px 24px;border-top:1px solid rgba(255,255,255,.08)}
.sidebar-foot a{display:block;padding:9px 0;font-size:.8rem;color:rgba(255,255,255,.5);text-decoration:none;transition:color .2s}
.sidebar-foot a:hover{color:#fff}
.main{flex:1;overflow-y:auto;padding:36px 40px}
.page-tag{font-size:.65rem;font-weight:500;letter-spacing:.25em;text-transform:uppercase;color:var(--gold);margin-bottom:8px}
.page-title{font-family:var(--font-h);font-size:2.4rem;font-weight:400;color:var(--dark);margin-bottom:28px}
.layout{display:grid;grid-template-columns:300px 1fr;gap:24px;align-items:start}
.card{background:var(--white);border:1px solid var(--border);padding:24px}
.card-title{font-family:var(--font-h);font-size:1.2rem;font-weight:600;color:var(--dark);margin-bottom:18px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:.7rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.form-input{width:100%;padding:10px 12px;border:1.5px solid var(--border);background:var(--bg);font-family:var(--font-b);font-size:.9rem;color:var(--text);outline:none;transition:border-color .2s}
.form-input:focus{border-color:var(--gold)}
.btn-submit{width:100%;padding:12px;background:var(--dark);color:#fff;font-family:var(--font-b);font-size:.8rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;border:none;cursor:pointer;transition:background .2s;margin-top:4px}
.btn-submit:hover{background:var(--gold)}
table{width:100%;border-collapse:collapse;font-size:.85rem}
thead th{text-align:left;padding:10px 12px;font-size:.68rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);border-bottom:2px solid var(--border)}
tbody tr{border-bottom:1px solid var(--border);transition:background .15s}
tbody tr:hover{background:var(--bg)}
tbody td{padding:12px;color:var(--text);vertical-align:middle}
.badge{display:inline-block;padding:3px 10px;font-size:.65rem;font-weight:500;letter-spacing:.06em;text-transform:uppercase}
.badge-admin{background:#fefce8;color:#854d0e;border:1px solid #fde68a}
.badge-staff{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}
.badge-guest{background:#f9fafb;color:#6b7280;border:1px solid #e5e7eb}
@media(max-width:900px){.layout{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="sidebar">
  <a class="sidebar-logo" href="/rooms"><span>Elite</span> Stays</a>
  <div class="sidebar-label">Admin Panel</div>
  <nav class="sidebar-nav">
    <a href="/admin/dashboard" class="sidebar-link">&#9632; Dashboard</a>
    <a href="/admin/suites"    class="sidebar-link">&#9633; Manage Rooms</a>
    <a href="/admin/bookings"  class="sidebar-link">&#9633; All Bookings</a>
    <a href="/admin/guests"    class="sidebar-link active">&#9633; Users &amp; Staff</a>
  </nav>
  <div class="sidebar-foot"><a href="/rooms">&#8592; Guest View</a><a href="/logout">Logout</a></div>
</div>
<div class="main">
  <div class="page-tag">Admin</div>
  <div class="page-title">Users &amp; Staff</div>
  <div class="layout">
    <div class="card">
      <div class="card-title">Create Staff Account</div>
      <form th:action="@{/admin/staff/add}" method="post">
        <div class="form-group"><label class="form-label">Full Name</label><input type="text" name="name" class="form-input" placeholder="Staff name" required></div>
        <div class="form-group"><label class="form-label">Email Address</label><input type="email" name="email" class="form-input" placeholder="staff@hotel.com" required></div>
        <div class="form-group"><label class="form-label">Password</label><input type="password" name="password" class="form-input" placeholder="Set a password" required></div>
        <button type="submit" class="btn-submit">Create Staff Account</button>
      </form>
    </div>
    <div class="card">
      <div class="card-title">All Accounts</div>
      <table>
        <thead><tr><th>#</th><th>Name</th><th>Email</th><th>Role</th></tr></thead>
        <tbody>
          <tr th:each="u : ${allGuests}">
            <td style="color:var(--muted)">#<span th:text="${u.id}"></span></td>
            <td style="font-weight:500" th:text="${u.name}"></td>
            <td style="color:var(--muted)" th:text="${u.email}"></td>
            <td>
              <span th:if="${u.role == 'ADMIN'}" class="badge badge-admin">Admin</span>
              <span th:if="${u.role == 'STAFF'}" class="badge badge-staff">Staff</span>
              <span th:if="${u.role == 'GUEST'}" class="badge badge-guest">Guest</span>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
</body>
</html>
