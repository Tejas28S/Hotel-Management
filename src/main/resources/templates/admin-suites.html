<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Manage Rooms — Elite Stays Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#F7F4F0;--white:#FFFFFF;--dark:#1A1A1A;--gold:#A8832A;--border:#E5DFD7;--muted:#7A7166;--text:#2D2A26;--sidebar:#1C1C1C;--font-h:'Cormorant Garamond',Georgia,serif;--font-b:'Outfit',sans-serif}
body{font-family:var(--font-b);background:var(--bg);color:var(--text);display:flex;min-height:100vh}
.sidebar{width:220px;background:var(--sidebar);flex-shrink:0;display:flex;flex-direction:column}
.sidebar-logo{padding:22px 24px;border-bottom:1px solid rgba(255,255,255,.08);font-family:var(--font-h);font-size:1.3rem;color:#fff;text-decoration:none;letter-spacing:.05em}
.sidebar-logo span{color:var(--gold);font-style:italic}
.sidebar-label{font-size:.6rem;font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.3);padding:20px 24px 8px}
.sidebar-nav{flex:1}
.sidebar-link{display:block;padding:11px 24px;font-size:.85rem;color:rgba(255,255,255,.65);text-decoration:none;border-left:3px solid transparent;transition:all .2s}
.sidebar-link:hover,.sidebar-link.active{background:rgba(255,255,255,.05);color:#fff;border-left-color:var(--gold)}
.sidebar-link.active{color:var(--gold)}
.sidebar-foot{padding:20px 24px;border-top:1px solid rgba(255,255,255,.08)}
.sidebar-foot a{display:block;padding:9px 0;font-size:.8rem;color:rgba(255,255,255,.5);text-decoration:none;transition:color .2s}
.sidebar-foot a:hover{color:#fff}
.main{flex:1;overflow-y:auto;padding:36px 40px}
.page-tag{font-size:.65rem;font-weight:500;letter-spacing:.25em;text-transform:uppercase;color:var(--gold);margin-bottom:8px}
.page-title{font-family:var(--font-h);font-size:2.4rem;font-weight:400;color:var(--dark);margin-bottom:28px}
.layout{display:grid;grid-template-columns:300px 1fr;gap:24px;align-items:start}
.card{background:var(--white);border:1px solid var(--border);padding:24px}
.card-title{font-family:var(--font-h);font-size:1.2rem;font-weight:600;color:var(--dark);margin-bottom:18px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:.7rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.form-input,.form-select{width:100%;padding:10px 12px;border:1.5px solid var(--border);background:var(--bg);font-family:var(--font-b);font-size:.9rem;color:var(--text);outline:none;transition:border-color .2s}
.form-input:focus,.form-select:focus{border-color:var(--gold)}
.btn-submit{width:100%;padding:12px;background:var(--gold);color:#fff;font-family:var(--font-b);font-size:.8rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;border:none;cursor:pointer;transition:background .2s;margin-top:4px}
.btn-submit:hover{background:var(--dark)}
table{width:100%;border-collapse:collapse;font-size:.85rem}
thead th{text-align:left;padding:10px 12px;font-size:.68rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);border-bottom:2px solid var(--border)}
tbody tr{border-bottom:1px solid var(--border);transition:background .15s}
tbody tr:hover{background:var(--bg)}
tbody td{padding:12px;color:var(--text);vertical-align:middle}
.room-thumb{width:44px;height:36px;object-fit:cover}
.badge{display:inline-block;padding:3px 10px;font-size:.65rem;font-weight:500;letter-spacing:.06em;text-transform:uppercase}
.badge-available{background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0}
.badge-reserved{background:#fefce8;color:#ca8a04;border:1px solid #fde68a}
.badge-occupied{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}
.badge-cleaning{background:#fff7ed;color:#ea580c;border:1px solid #fed7aa}
.badge-maintenance{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}
.btn-row{display:flex;gap:6px;align-items:center}
.btn-sm{padding:5px 10px;font-size:.68rem;font-weight:500;letter-spacing:.06em;text-transform:uppercase;border:1.5px solid var(--border);background:transparent;cursor:pointer;color:var(--text);font-family:var(--font-b);transition:all .2s}
.btn-sm:hover{border-color:var(--gold);color:var(--gold)}
.btn-sm-danger{border-color:#fca5a5;color:#dc2626}.btn-sm-danger:hover{background:#fef2f2}
.select-sm{padding:4px 8px;font-size:.72rem;border:1.5px solid var(--border);background:var(--bg);font-family:var(--font-b);color:var(--text);cursor:pointer}
@media(max-width:900px){.layout{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="sidebar">
  <a class="sidebar-logo" href="/rooms"><span>Elite</span> Stays</a>
  <div class="sidebar-label">Admin Panel</div>
  <nav class="sidebar-nav">
    <a href="/admin/dashboard" class="sidebar-link">&#9632; Dashboard</a>
    <a href="/admin/suites"    class="sidebar-link active">&#9633; Manage Rooms</a>
    <a href="/admin/bookings"  class="sidebar-link">&#9633; All Bookings</a>
    <a href="/admin/guests"    class="sidebar-link">&#9633; Users &amp; Staff</a>
  </nav>
  <div class="sidebar-foot"><a href="/rooms">&#8592; Guest View</a><a href="/logout">Logout</a></div>
</div>
<div class="main">
  <div class="page-tag">Admin</div>
  <div class="page-title">Manage Rooms</div>
  <div class="layout">
    <!-- Add room form -->
    <div class="card">
      <div class="card-title">Add New Room</div>
      <form th:action="@{/admin/suites/add}" method="post">
        <div class="form-group"><label class="form-label">Room Number</label><input type="text" name="roomNumber" class="form-input" placeholder="e.g. 101" required></div>
        <div class="form-group"><label class="form-label">Room Type</label>
          <select name="roomType" class="form-select" required>
            <option value="Standard Room">Standard Room</option>
            <option value="Deluxe Room">Deluxe Room</option>
            <option value="Executive Suite">Executive Suite</option>
            <option value="Skyline Penthouse">Skyline Penthouse</option>
            <option value="Oceanfront Villa">Oceanfront Villa</option>
          </select>
        </div>
        <div class="form-group"><label class="form-label">Price per Night (₹)</label><input type="number" name="price" class="form-input" placeholder="e.g. 8500" required></div>
        <div class="form-group"><label class="form-label">Image URL (optional)</label><input type="text" name="imageUrl" class="form-input" placeholder="https://..."></div>
        <button type="submit" class="btn-submit">Add Room</button>
      </form>
    </div>
    <!-- Rooms table -->
    <div class="card">
      <div class="card-title">All Rooms</div>
      <div style="overflow-x:auto">
        <table>
          <thead><tr><th>Image</th><th>Room No.</th><th>Type</th><th>Price/Night</th><th>Status</th><th>Update</th><th>Delete</th></tr></thead>
          <tbody>
            <tr th:each="room : ${allRooms}">
              <td><img class="room-thumb" th:src="${#strings.containsIgnoreCase(room.roomType,'penthouse')} ? 'https://images.unsplash.com/photo-1600607687939-ce8a6c25118c?w=100&q=70' : (${#strings.containsIgnoreCase(room.roomType,'villa')} ? 'https://images.unsplash.com/photo-1613490908592-fd53b1b9195b?w=100&q=70' : (${#strings.containsIgnoreCase(room.roomType,'suite')} ? 'https://images.unsplash.com/photo-1631049307264-da0ec9d70304?w=100&q=70' : (${#strings.containsIgnoreCase(room.roomType,'deluxe')} ? 'https://images.unsplash.com/photo-1618773928121-c32242e63f39?w=100&q=70' : 'https://images.unsplash.com/photo-1595576508898-0ad5c879a061?w=100&q=70')))" alt=""></td>
              <td style="font-weight:600" th:text="${room.roomNumber}"></td>
              <td th:text="${room.roomType}"></td>
              <td th:text="'₹' + ${room.price}"></td>
              <td>
                <span th:switch="${room.status.name()}">
                  <span th:case="'AVAILABLE'"         class="badge badge-available">Available</span>
                  <span th:case="'RESERVED'"          class="badge badge-reserved">Reserved</span>
                  <span th:case="'OCCUPIED'"          class="badge badge-occupied">Occupied</span>
                  <span th:case="'CLEANING'"          class="badge badge-cleaning">Cleaning</span>
                  <span th:case="'UNDER_MAINTENANCE'" class="badge badge-maintenance">Maintenance</span>
                </span>
              </td>
              <td>
                <form th:action="@{/admin/suites/status/{id}(id=${room.id})}" method="post" style="display:flex;gap:6px">
                  <select name="status" class="select-sm">
                    <option th:each="s : ${statuses}" th:value="${s.name()}" th:text="${s.name()}" th:selected="${s == room.status}"></option>
                  </select>
                  <button type="submit" class="btn-sm">Set</button>
                </form>
              </td>
              <td>
                <form th:action="@{/admin/suites/delete/{id}(id=${room.id})}" method="post" onsubmit="return confirm('Delete this room?')">
                  <button type="submit" class="btn-sm btn-sm-danger">Delete</button>
                </form>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
</body>
</html>
