<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>All Bookings — Elite Stays Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#F7F4F0;--white:#FFFFFF;--dark:#1A1A1A;--gold:#A8832A;--border:#E5DFD7;--muted:#7A7166;--text:#2D2A26;--sidebar:#1C1C1C;--font-h:'Cormorant Garamond',Georgia,serif;--font-b:'Outfit',sans-serif}
body{font-family:var(--font-b);background:var(--bg);color:var(--text);display:flex;min-height:100vh}
.sidebar{width:220px;background:var(--sidebar);flex-shrink:0;display:flex;flex-direction:column}
.sidebar-logo{padding:22px 24px;border-bottom:1px solid rgba(255,255,255,.08);font-family:var(--font-h);font-size:1.3rem;color:#fff;text-decoration:none}
.sidebar-logo span{color:var(--gold);font-style:italic}
.sidebar-label{font-size:.6rem;font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.3);padding:20px 24px 8px}
.sidebar-nav{flex:1}
.sidebar-link{display:block;padding:11px 24px;font-size:.85rem;color:rgba(255,255,255,.65);text-decoration:none;border-left:3px solid transparent;transition:all .2s}
.sidebar-link:hover,.sidebar-link.active{background:rgba(255,255,255,.05);color:#fff;border-left-color:var(--gold)}
.sidebar-link.active{color:var(--gold)}
.sidebar-foot{padding:20px 24px;border-top:1px solid rgba(255,255,255,.08)}
.sidebar-foot a{display:block;padding:9px 0;font-size:.8rem;color:rgba(255,255,255,.5);text-decoration:none;transition:color .2s}
.sidebar-foot a:hover{color:#fff}
.main{flex:1;overflow-y:auto;padding:36px 40px}
.page-tag{font-size:.65rem;font-weight:500;letter-spacing:.25em;text-transform:uppercase;color:var(--gold);margin-bottom:8px}
.page-title{font-family:var(--font-h);font-size:2.4rem;font-weight:400;color:var(--dark);margin-bottom:28px}
.card{background:var(--white);border:1px solid var(--border);padding:24px;overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.85rem}
thead th{text-align:left;padding:10px 12px;font-size:.68rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);border-bottom:2px solid var(--border)}
tbody tr{border-bottom:1px solid var(--border);transition:background .15s}
tbody tr:hover{background:var(--bg)}
tbody td{padding:12px;color:var(--text);vertical-align:middle}
.badge{display:inline-block;padding:3px 10px;font-size:.65rem;font-weight:500;letter-spacing:.06em;text-transform:uppercase}
.badge-confirmed{background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0}
.badge-checkedin{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}
.badge-completed{background:#f9fafb;color:#6b7280;border:1px solid #e5e7eb}
.badge-cancelled{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}
.price{font-family:var(--font-h);font-size:1.05rem;color:var(--gold);font-weight:600}
.btn-sm-danger{padding:5px 12px;font-size:.68rem;font-weight:500;text-transform:uppercase;border:1.5px solid #fca5a5;background:transparent;color:#dc2626;cursor:pointer;font-family:var(--font-b);letter-spacing:.06em;transition:background .2s}
.btn-sm-danger:hover{background:#fef2f2}
.empty-row td{text-align:center;color:var(--muted);padding:40px}
</style>
</head>
<body>
<div class="sidebar">
  <a class="sidebar-logo" href="/rooms"><span>Elite</span> Stays</a>
  <div class="sidebar-label">Admin Panel</div>
  <nav class="sidebar-nav">
    <a href="/admin/dashboard" class="sidebar-link">&#9632; Dashboard</a>
    <a href="/admin/suites"    class="sidebar-link">&#9633; Manage Rooms</a>
    <a href="/admin/bookings"  class="sidebar-link active">&#9633; All Bookings</a>
    <a href="/admin/guests"    class="sidebar-link">&#9633; Users &amp; Staff</a>
  </nav>
  <div class="sidebar-foot"><a href="/rooms">&#8592; Guest View</a><a href="/logout">Logout</a></div>
</div>
<div class="main">
  <div class="page-tag">Admin</div>
  <div class="page-title">All Bookings</div>
  <div class="card">
    <table>
      <thead><tr><th>#</th><th>Guest</th><th>Room</th><th>Check-In</th><th>Check-Out</th><th>Total</th><th>Status</th><th>Action</th></tr></thead>
      <tbody>
        <tr th:if="${#lists.isEmpty(allBookings)}" class="empty-row"><td colspan="8">No bookings found.</td></tr>
        <tr th:each="b : ${allBookings}">
          <td style="color:var(--muted)">#<span th:text="${b.id}"></span></td>
          <td style="font-weight:500" th:text="${b.guest.name}"></td>
          <td><span th:text="${b.room.roomType}"></span> <span style="color:var(--muted);font-size:.78rem" th:text="'· ' + ${b.room.roomNumber}"></span></td>
          <td th:text="${b.checkInDate}"></td>
          <td th:text="${b.checkOutDate}"></td>
          <td><span class="price">&#8377;<span th:text="${b.totalPrice}"></span></span></td>
          <td>
            <span th:switch="${b.status.name()}">
              <span th:case="'CONFIRMED'"   class="badge badge-confirmed">Confirmed</span>
              <span th:case="'CHECKED_IN'"  class="badge badge-checkedin">Checked In</span>
              <span th:case="'CHECKED_OUT'" class="badge badge-completed">Completed</span>
              <span th:case="'CANCELLED'"   class="badge badge-cancelled">Cancelled</span>
            </span>
          </td>
          <td>
            <form th:if="${b.status.name() == 'CONFIRMED'}" th:action="@{/admin/bookings/cancel/{id}(id=${b.id})}" method="post">
              <button type="submit" class="btn-sm-danger" onclick="return confirm('Cancel this booking?')">Cancel</button>
            </form>
            <span th:if="${b.status.name() != 'CONFIRMED'}" style="color:var(--muted);font-size:.8rem">—</span>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
</body>
</html>
